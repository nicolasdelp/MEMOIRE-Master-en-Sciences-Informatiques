[workspace]
name = "TrackMyLift-AI"
version = "1.0.0"
authors = ["Nicolas Delplanque"]
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12.2"

[environments]
env-scripts = ["scripts"]
env-sam3 = ["sam3"]
env-moge = ["moge"]
env-taco = ["taco"]
env-sam-3d-body = ["sam-3d-body"]

# ----------------------------------
# Scripts
# ----------------------------------
[feature.scripts.dependencies]
python = "3.12.*"

[feature.scripts.pypi-dependencies]
opencv-python = "==4.10.0.84"
tqdm = "*"
numpy = ">=1.26,<2"
pillow = "==10.4.0"
scipy = "*"
pandas = "*"
pycocotools = "*"
matplotlib = "*"

# ----------------------------------
# SAM 3
# ----------------------------------
[feature.sam3.dependencies]
python = "3.12.*"

[feature.sam3.pypi-dependencies]
cuda-toolkit = "==12.6.0"
torch = "==2.10.0"
torchvision = "*"
timm = ">=1.0.17"
numpy = ">=1.26,<2"
tqdm = "*"
ftfy = "==6.1.1"
regex = "*"
iopath = ">=0.1.10"
typing_extensions = "*"
huggingface_hub = "==0.25.2"
einops = "*"
decord = "*"
pycocotools = "*"
psutil = "*"
opencv-python = "*"
matplotlib = "*"
pandas = "*"
scikit-image = "*"
scikit-learn = "*"

# ----------------------------------
# MoGe
# ----------------------------------
[feature.moge.dependencies]
python = "3.12.*"

[feature.moge.pypi-dependencies]
cuda-toolkit = "==12.6.0"
torch = "==2.10.0"
torchvision = "*"
gradio = "==2.8.13"
click = "==8.1.7"
opencv-python = "==4.10.0.84"
scipy = "==1.14.1"
matplotlib = "==3.9.2"
trimesh = "==4.5.1"
pillow = "==10.4.0"
huggingface_hub = "==0.25.2"
utils3d = { git = "https://github.com/EasternJournalist/utils3d.git", rev = "3fab839f0be9931dac7c8488eb0e1600c236e183" }
pipeline = { git = "https://github.com/EasternJournalist/pipeline.git", rev = "866f059d2a05cde05e4a52211ec5051fd5f276d6" }

# ----------------------------------
# Taco
# ----------------------------------
[feature.taco.dependencies]
python = "3.10.*"

[feature.taco.pypi-dependencies]
demos = "*"
diffusers = "*"
einops = "*"
fire = "*"
fitz = "*"
fsspec = "*"
gradio = "*"
invisible_watermark = "*"
joblib = "*"
kornia = "*"
lovely_numpy = "*"
lovely_tensors = "*"
lpips = "*"
matplotlib = "*"
mediapy = "*"
natsort = "*"
numpy = "*"
omegaconf = "*"
open_clip_torch = "*"
opencv_python = "*"
pandas = "*"
packaging = "*"
peft = "==0.7.1"
bitsandbytes = "*"
Pillow = "*"
plotly = "*"
protobuf = "*"
pudb = "*"
pyquaternion = "*"
pytorchvideo = "*"
pyspng = "*"
pytest = "*"
pytorch_fid = "*"
pytorch_lightning = "*"
Requests = "*"
rich = "*"
safetensors = "*"
scikit-image = "*"
scikit_learn = "*"
scipy = "*"
seaborn = "*"
streamlit = "*"
