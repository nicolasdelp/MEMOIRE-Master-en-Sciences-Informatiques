# ----------------------------------
# SAM 3D Body
# ----------------------------------
[feature.sam-3d-body.dependencies]
python = "3.12.*"

[feature.sam-3d-body.pypi-dependencies]
cuda-toolkit = "==12.6.0"
torch = "==2.10.0"
torchvision = "*"
pytorch-lightning = "*"
pyrender = "*"
opencv-python = "*"
yacs = "*"
scikit-image = "*"
einops = "*"
timm = "*"
dill = "*"
pandas = "*"
rich = "*"
hydra-core = "*"
hydra-submitit-launcher = "*"
hydra-colorlog = "*"
pyrootutils = "*"
webdataset = "*"
chump = "*"
networkx = "==3.2.1"
roma = "*"
joblib = "*"
seaborn = "*"
wandb = "*"
appdirs = "*"
appnope = "*"
ffmpeg = "*"
cython = "*"
jsonlines = "*"
pytest = "*"
numpy = "*"
# xtcocotools = "*"
loguru = "*"
optree = "*"
fvcore = "*"
black = "*"
pycocotools = "*"
tensorboard = "*"
huggingface_hub = "*"
detectron2 = { git = "https://github.com/facebookresearch/detectron2.git", rev = "a1ce2f9" }
moge = { git = "https://github.com/microsoft/MoGe.git" }

[feature.sam-3d-body.pypi-options]
no-build-isolation = ["detectron2"]


# ----------------------------------------------------------------------------------------
# Tasks
# ----------------------------------------------------------------------------------------

[feature.scripts.tasks]
data-analysis = { cmd = "python code/scripts/data-analysis.py {{ path }}", args = [
    { arg = "path", default = "/media/pc/hdd2/data-students/nicolasdelplanque/TrackMyLift-AI/data/imu/DELPLANQUE_Nicolas/2025-10-20/20251020175724_SQUAT.txt" },
] }
extract-frames = { cmd = "python code/scripts/extract-frames.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
extract-frames-dataset = { cmd = "bash -c 'python code/scripts/extract-frames.py -video_filename {{ video }} --augment --seed $RANDOM'", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
depth-filtering = { cmd = "python code/scripts/depth-filtering.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
subfolder-depth-filtering = { cmd = "python code/scripts/subfolder-depth-filtering.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
remove-background = { cmd = "python code/scripts/remove-background.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
subfolder-remove-background = { cmd = "python code/scripts/subfolder-remove-background.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
subfolder-artificial-occlusion = { cmd = "python code/scripts/subfolder-artificial-occlusion.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
prepare-taco-dataset = { cmd = "python code/scripts/prepare-taco-dataset.py --input $INPUT --output $OUTPUT --train-frac $RATIO", env = { INPUT = "/media/pc/hdd2/data-students/nicolasdelplanque/TrackMyLift-AI/data/outputs", OUTPUT = "/media/pc/hdd2/data-students/nicolasdelplanque/TrackMyLift-AI/data/datasets/custom", RATIO = "0.7" } }

[feature.sam3.tasks]
sam3 = { cmd = "python code/models/sam3/run_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
], env = { PYTHONPATH = "code" } }
sam3-subfolder = { cmd = "python code/models/sam3/run_subfolder_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
], env = { PYTHONPATH = "code" } }
sam3-subfolder-occluded = { cmd = "python code/models/sam3/run_subfolder_inference.py -video_filename {{ video }} -occluded True", args = [
    { arg = "video", default = "IMG_0001.mov" },
], env = { PYTHONPATH = "code" } }

[feature.moge.tasks]
moge = { cmd = "python code/models/moge/run_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
moge-visualisation = { cmd = "python code/models/moge/run_inference.py -video_filename {{ video }} -visualisation True", args = [
    { arg = "video", default = "IMG_0001.MOV" },
] }
moge-subfolder = { cmd = "python code/models/moge/run_subfolder_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
], env = { PYTHONPATH = "code" } }
moge-subfolder-visualisation = { cmd = "python code/models/moge/run_subfolder_inference.py -video_filename {{ video }} -visualisation True", args = [
    { arg = "video", default = "IMG_0001.MOV" },
] }

[feature.taco.tasks]
taco = { cmd = "python code/models/taco/run_inference.py -video_filename {{ video }} --model {{ model }}", args = [
    { arg = "video", default = "IMG_0098.mov" },
    { arg = "model", default = "lora" },
] }
taco-baseline = { cmd = "python code/models/taco/run_subfolder_inference.py -video_filename {{ video }} --model {{ model }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
    { arg = "model", default = "baseline" },
] }
taco-lora = { cmd = "python code/models/taco/run_subfolder_inference.py -video_filename {{ video }} --model {{ model }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
    { arg = "model", default = "lora" },
] }

[feature.sam-3d-body.tasks]
sam-3d-body = { cmd = "python code/models/sam_3d_body/run_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
occulted-sam-3d-body = { cmd = "python code/models/sam_3d_body/run_occulted_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
taco-sam-3d-body = { cmd = "python code/models/sam_3d_body/run_taco_inference.py -video_filename {{ video }}", args = [
    { arg = "video", default = "IMG_0001.mov" },
] }

[tasks]
create-dataset-pipeline = { depends-on = [
    { task = "extract-frames-dataset", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "sam3-subfolder", environment = "env-sam3", args = [
        "{{ video }}",
    ] },
    { task = "moge-subfolder", environment = "env-moge", args = [
        "{{ video }}",
    ] },
    { task = "subfolder-depth-filtering", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "subfolder-remove-background", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "subfolder-artificial-occlusion", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "sam3-subfolder-occluded", environment = "env-sam3", args = [
        "{{ video }}",
    ] },
], args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
main-pipeline = { depends-on = [
    { task = "extract-frames", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "sam3", environment = "env-sam3", args = [
        "{{ video }}",
    ] },
    { task = "moge", environment = "env-moge", args = [
        "{{ video }}",
    ] },
    { task = "depth-filtering", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "remove-background", environment = "env-scripts", args = [
        "{{ video }}",
    ] },
    { task = "taco", environment = "env-taco", args = [
        "{{ video }}",
    ] },
], args = [
    { arg = "video", default = "IMG_0001.mov" },
] }
